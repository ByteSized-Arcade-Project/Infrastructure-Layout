<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ByteSized Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #080c10;
    --bg2:     #0d1117;
    --bg3:     #131b24;
    --border:  rgba(255,255,255,0.07);
    --accent:  #00e5ff;
    --accent2: rgba(0,229,255,0.12);
    --text:    #dde6ed;
    --muted:   rgba(221,230,237,0.38);
    --gold:    #ffd166;
    --silver:  #b8c0cc;
    --bronze:  #c9874f;
    --danger:  #ff4d6d;
    --cell:    21px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 860px;
    padding: 36px 28px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(0,229,255,0.4));
  }

  .tagline {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* ── MAIN ── */
  main {
    width: 100%;
    max-width: 860px;
    padding: 0 28px;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 28px;
    align-items: start;
  }

  /* ── GAME COLUMN ── */
  .game-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .score-strip {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg2);
  }
  .score-cell {
    flex: 1;
    padding: 11px 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .score-cell + .score-cell {
    border-left: 1px solid var(--border);
  }
  .sc-label {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sc-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1;
  }
  .sc-val.hi { color: var(--accent); }

  .canvas-wrap {
    position: relative;
    line-height: 0;
  }

  canvas {
    display: block;
    width: 420px;
    height: 420px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg2);
  }

  .overlay-state {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(8,12,16,0.88);
    border-radius: 6px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(2px);
  }
  .overlay-state.active { display: flex; }

  .ov-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }
  .ov-title.danger { color: var(--danger); }
  .ov-sub {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 20px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.15s, transform 0.1s;
    line-height: 1;
  }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #080c10;
  }
  .btn-primary:hover { opacity: 0.88; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
